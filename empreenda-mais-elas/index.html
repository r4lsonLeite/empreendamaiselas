<!doctype html>
<html lang="pt-BR" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Empreenda Mais Elas</title>
    
    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

    <!-- Tailwind via CDN com suas cores customizadas -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-low": "#f3f4f5",
                        "primary": "#ab332a",
                        "secondary": "#7a4c8f",
                        "surface-container-highest": "#e1e3e4",
                        "outline-variant": "#e0bfbb",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f8f9fa",
                        "on-background": "#191c1d",
                        "on-surface": "#191c1d",
                        "on-surface-variant": "#58413e",
                        "on-primary": "#ffffff",
                        "primary-container": "#ff7061",
                        "surface": "#f8f9fa"
                    },
                    spacing: {
                        "container-padding-mobile": "20px",
                        "container-padding-desktop": "48px",
                        "base": "8px",
                        "stack-sm": "12px",
                        "stack-md": "24px",
                        "stack-lg": "48px",
                    },
                    fontFamily: {
                        "label-sm": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Playfair Display"],
                        "headline-lg-mobile": ["Playfair Display"],
                        "headline-lg": ["Playfair Display"],
                        "headline-xl": ["Playfair Display"]
                    }
                }
            }
        }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
